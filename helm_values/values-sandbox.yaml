image:
  postfix:
    repository: ghcr.io/0kaba0hub/yarilo-postfix
    tag: latest
    pullPolicy: Always

mail:
  domain: d00001.test
  hostname: relay.d00001.test
  mynetworks: "127.0.0.0/8 10.0.0.0/8 10.1.0.0/16"

yarilo:
  saslLoginAddr: "yarilo-sasl-login.yarilo-sb.svc.cluster.local:12325"
  lmtpHost: "yarilo-lmtp-login.yarilo-sb.svc.cluster.local"
  lmtpPort: "24"

mysql:
  secretName: yarilo-mysql
  host: "yarilo-mysql.yarilo-sb.svc.cluster.local"

tls:
  secretName: yarilo-tls

dkim:
  selector: defaultmail

rspamd:
  rejectScore: 15
  addHeaderScore: 6

resources:
  rspamd:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

opendkim:
  enabled: true

mx:
  enabled: true
  rblRestrictions: ""
  service:
    type: ClusterIP
    port: 25

mta:
  enabled: true
  service:
    type: ClusterIP
    port: 587

fwd:
  enabled: true
  lmtpAddr: "yarilo-lmtp-login.yarilo-sb.svc.cluster.local:24"
  saslUser: "sieve_relay"
  saslSecretName: "fwd-sasl-secret"
  service:
    type: ClusterIP
    port: 25

postsrsd:
  enabled: true
  domain: mail-sb.seconddns.com
  secretName: postsrsd-secret
  debug: true
  service:
    type: ClusterIP
