image:
  postfix:
    repository: ghcr.io/0kaba0hub/yarilo-postfix
    tag: latest
    pullPolicy: Always

mail:
  domain: d00001.test
  hostname: relay.d00001.test
  mynetworks: "127.0.0.0/8 10.0.0.0/8 10.1.0.0/16"

yarilo:
  saslLoginAddr: "yarilo-sasl-login.yarilo-sb.svc:12325"
  lmtpHost: "yarilo-lmtp.yarilo-sb.svc"
  lmtpPort: "24"

mysql:
  secretName: yarilo-mysql
  host: "yarilo-mysql.yarilo-sb.svc"

tls:
  secretName: yarilo-tls

dkim:
  selector: defaultmail

rspamd:
  rejectScore: 15
  addHeaderScore: 6

opendkim:
  enabled: false

mx:
  enabled: true
  rblRestrictions: ""
  service:
    type: ClusterIP
    port: 25

mta:
  enabled: true
  service:
    type: ClusterIP
    port: 587

fwd:
  enabled: true
  lmtpAddr: ""
  service:
    type: ClusterIP
    port: 25

postsrsd:
  enabled: true
  domain: mail-sb.seconddns.com
  secretName: postsrsd-secret
  debug: true
  service:
    type: ClusterIP
