{{- if .Values.fwd.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: rspamd-fwd-config
  namespace: {{ .Release.Namespace }}
data:
  actions.conf: |
    reject = {{ .Values.fwd.rspamd.rejectScore }};
    add_header = {{ .Values.fwd.rspamd.rejectScore }};
  dkim_signing.conf: |
    enabled = true;
    use_domain = "envelope";
    selector = {{ .Values.dkim.selector | quote }};
    path = "/etc/rspamd/dkim/$domain.$selector.key";
  rbl.conf: |
    enabled = false;
  antivirus.conf: |
    enabled = false;
  worker-proxy.inc: |
    milter = yes;
    timeout = 120s;
    upstream "local" {
      default = yes;
      self_scan = yes;
    }
{{- end }}
