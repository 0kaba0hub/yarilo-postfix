{{- if .Values.fwd.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay-fwd
  namespace: {{ .Release.Namespace }}
  labels:
    app: relay-fwd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: relay-fwd
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: relay-fwd
    spec:
      containers:
        - name: postfix
          image: "{{ .Values.image.postfix.repository }}:{{ .Values.image.postfix.tag }}"
          imagePullPolicy: {{ .Values.image.postfix.pullPolicy }}
          ports:
            - containerPort: 25
              name: smtp
          env:
            - name: RELAY_TYPE
              value: fwd
            - name: MAIL_DOMAIN
              value: {{ .Values.mail.domain | quote }}
            - name: MAIL_HOSTNAME
              value: {{ .Values.mail.hostname | quote }}
            - name: MAIL_MYNETWORKS
              value: {{ .Values.mail.mynetworks | quote }}
            - name: MAIL_DOMAINS
              value: {{ include "yarilo-postfix.mailDomains" . | quote }}
            - name: RSPAMD_ADDR
              value: "relay-rspamd-fwd:11332"
            - name: POSTSRSD_ADDR
              value: "relay-postsrsd:10001"
            - name: POSTSRSD_REVERSE_ADDR
              value: "relay-postsrsd:10002"
            {{- if .Values.fwd.lmtpAddr }}
            - name: LMTP_ADDR
              value: {{ .Values.fwd.lmtpAddr | quote }}
            {{- end }}
            {{- include "yarilo-postfix.mysqlEnv" .Values | nindent 12 }}
          volumeMounts:
            {{- include "yarilo-postfix.tlsMount" .Values.tls.secretName | nindent 12 }}
          resources:
            {{- toYaml .Values.resources.postfix | nindent 12 }}
      volumes:
        {{- include "yarilo-postfix.tlsVolume" .Values.tls.secretName | nindent 8 }}
{{- end }}
