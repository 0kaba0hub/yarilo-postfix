{{- if .Values.postsrsd.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: relay-postsrsd
  namespace: {{ .Release.Namespace }}
  labels:
    app: relay-postsrsd
spec:
  type: {{ .Values.postsrsd.service.type }}
  selector:
    app: relay-postsrsd
  ports:
    - name: forward
      port: 10001
      targetPort: forward
    - name: reverse
      port: 10002
      targetPort: reverse
{{- end }}
