{{- if or .Values.mx.enabled .Values.mta.enabled .Values.fwd.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: relay-rspamd-config
  namespace: {{ .Release.Namespace }}
data:
  actions.conf: |
    reject = {{ .Values.rspamd.rejectScore }};
    add_header = {{ .Values.rspamd.addHeaderScore }};
  dkim_signing.conf: |
    enabled = false;
  rbl.conf: |
    enabled = false;
  antivirus.conf: |
    enabled = false;
  worker-proxy.inc: |
    milter = yes;
    timeout = 120s;
    upstream "local" {
      default = yes;
      self_scan = yes;
    }
{{- end }}
