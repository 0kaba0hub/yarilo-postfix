image:
  postfix:
    repository: ghcr.io/0kaba0hub/yarilo-postfix
    tag: latest
    pullPolicy: Always
  rspamd:
    repository: rspamd/rspamd
    tag: "4.1.0"
    pullPolicy: IfNotPresent
  opendkim:
    repository: instrumentisto/opendkim
    tag: "2.11"
    pullPolicy: IfNotPresent
  postsrsd:
    repository: ghcr.io/0kaba0hub/postsrsd
    tag: "2.1.0-5"
    pullPolicy: IfNotPresent

mail:
  domain: example.com
  hostname: mail.example.com
  mynetworks: "127.0.0.0/8 10.0.0.0/8"
  # Additional virtual domains beyond mail.domain (space-separated).
  extraDomains: ""

yarilo:
  saslLoginAddr: ""
  lmtpHost: ""
  lmtpPort: "24"

mysql:
  secretName: ""
  host: "yarilo-mysql"

tls:
  secretName: ""

dkim:
  selector: defaultmail

rspamd:
  rejectScore: 15
  addHeaderScore: 6

opendkim:
  enabled: false

mx:
  enabled: false
  # Space-separated Postfix reject_rbl_client entries appended to smtpd_recipient_restrictions.
  rblRestrictions: "reject_rbl_client zen.spamhaus.org, reject_rbl_client bl.spamcop.net"
  service:
    type: ClusterIP
    port: 25
    annotations: {}

mta:
  enabled: false
  service:
    type: ClusterIP
    port: 587
    annotations: {}

fwd:
  enabled: false
  lmtpAddr: ""
  saslLoginAddr: ""
  service:
    type: ClusterIP
    port: 25
    annotations: {}

postsrsd:
  enabled: false
  domain: ""
  secretName: ""
  redisAddr: ""
  debug: false
  service:
    type: ClusterIP

resources:
  postfix:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  rspamd:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  opendkim:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 32Mi
  postsrsd:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 32Mi
